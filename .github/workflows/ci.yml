name: CI

on:
  pull_request:
    branches:
      - master

    types:
      - opened
      - reopened
      - edited
      - synchronize
    paths-ignore:
      - ".editorconfig"
  push:
    branches:
      - master
    paths-ignore:
      - ".editorconfig"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  verify:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    name: verify (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run verify:build
