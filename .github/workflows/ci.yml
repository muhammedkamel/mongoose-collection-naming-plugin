name: CI

on:
  pull_request:
    branches:
      - master

    types:
      - opened
      - reopened
      - edited
      - synchronize
    paths-ignore:
      - '.editorconfig'
  push:
    branches:
      - master
    paths-ignore:
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run verify
